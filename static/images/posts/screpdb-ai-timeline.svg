<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="480" fill="#ffffff"/>

  <!-- Title -->
  <text x="60" y="34" font-size="20" font-weight="700" fill="#0f172a">As the models got better, the tool shipped faster</text>

  <!-- Acceleration zone shading (May-Jul '26) -->
  <rect x="634" y="52" width="216" height="360" fill="#ecfdf5"/>
  <text x="742" y="68" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">May-Jul '26 · 40 of 63 releases</text>

  <!-- Claude release rail (dots + dotted stems to axis) -->
  <!-- Row A dots at y=100, Row B dots at y=165 -->
  <!-- Sonnet 4.5  x129 -->
  <line x1="129" y1="100" x2="129" y2="250" stroke="#34d399" stroke-width="1" stroke-dasharray="3 4"/>
  <circle cx="129" cy="100" r="4" fill="#059669"/>
  <text x="129" y="92" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">Sonnet 4.5</text>
  <!-- Haiku 4.5  x166 -->
  <line x1="166" y1="165" x2="166" y2="250" stroke="#34d399" stroke-width="1" stroke-dasharray="3 4"/>
  <circle cx="166" cy="165" r="4" fill="#059669"/>
  <text x="166" y="180" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">Haiku 4.5</text>
  <!-- Opus 4.5  x261 -->
  <line x1="261" y1="100" x2="261" y2="250" stroke="#34d399" stroke-width="1" stroke-dasharray="3 4"/>
  <circle cx="261" cy="100" r="4" fill="#059669"/>
  <text x="261" y="92" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">Opus 4.5</text>
  <!-- Sonnet 4.6  x463 -->
  <line x1="463" y1="165" x2="463" y2="250" stroke="#34d399" stroke-width="1" stroke-dasharray="3 4"/>
  <circle cx="463" cy="165" r="4" fill="#059669"/>
  <text x="463" y="180" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">Sonnet 4.6</text>
  <!-- Opus 4.8  x699 -->
  <line x1="699" y1="100" x2="699" y2="250" stroke="#34d399" stroke-width="1" stroke-dasharray="3 4"/>
  <circle cx="699" cy="100" r="4" fill="#059669"/>
  <text x="699" y="92" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">Opus 4.8</text>
  <!-- Fable 5  x728 -->
  <line x1="728" y1="165" x2="728" y2="250" stroke="#34d399" stroke-width="1" stroke-dasharray="3 4"/>
  <circle cx="728" cy="165" r="4" fill="#059669"/>
  <text x="728" y="180" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">Fable 5</text>
  <!-- Sonnet 5  x778 -->
  <line x1="778" y1="118" x2="778" y2="250" stroke="#34d399" stroke-width="1" stroke-dasharray="3 4"/>
  <circle cx="778" cy="118" r="4" fill="#059669"/>
  <text x="792" y="110" text-anchor="start" font-size="12" font-weight="600" fill="#059669">Sonnet 5</text>

  <!-- Axis -->
  <line x1="60" y1="250" x2="850" y2="250" stroke="#0f172a" stroke-width="1.5"/>

  <!-- screpdb monthly release bars (downward from axis) -->
  <!-- scale: 18 releases -> 150px  (k=8.33) -->
  <!-- Sep 4 -->
  <rect x="74"  y="250" width="44" height="33"  fill="#94a3b8"/>
  <text x="96"  y="298" text-anchor="middle" font-size="12" fill="#475569">4</text>
  <!-- Oct 7 -->
  <rect x="146" y="250" width="44" height="58"  fill="#94a3b8"/>
  <text x="168" y="323" text-anchor="middle" font-size="12" fill="#475569">7</text>
  <!-- Nov 4 -->
  <rect x="218" y="250" width="44" height="33"  fill="#94a3b8"/>
  <text x="240" y="298" text-anchor="middle" font-size="12" fill="#475569">4</text>
  <!-- Dec 0 -->
  <text x="311" y="268" text-anchor="middle" font-size="12" fill="#cbd5e1">0</text>
  <!-- Jan 3 -->
  <rect x="361" y="250" width="44" height="25"  fill="#94a3b8"/>
  <text x="383" y="290" text-anchor="middle" font-size="12" fill="#475569">3</text>
  <!-- Feb 3 -->
  <rect x="433" y="250" width="44" height="25"  fill="#94a3b8"/>
  <text x="455" y="290" text-anchor="middle" font-size="12" fill="#475569">3</text>
  <!-- Mar 0 -->
  <text x="527" y="268" text-anchor="middle" font-size="12" fill="#cbd5e1">0</text>
  <!-- Apr 2 -->
  <rect x="577" y="250" width="44" height="17"  fill="#94a3b8"/>
  <text x="599" y="282" text-anchor="middle" font-size="12" fill="#475569">2</text>
  <!-- May 12 -->
  <rect x="648" y="250" width="44" height="100" fill="#64748b"/>
  <text x="670" y="365" text-anchor="middle" font-size="12" fill="#334155">12</text>
  <!-- Jun 18 -->
  <rect x="720" y="250" width="44" height="150" fill="#64748b"/>
  <text x="742" y="415" text-anchor="middle" font-size="12" fill="#334155">18</text>
  <!-- Jul 10 (partial) -->
  <rect x="792" y="250" width="44" height="83"  fill="#94a3b8"/>
  <text x="814" y="348" text-anchor="middle" font-size="12" fill="#475569">10*</text>

  <!-- Month axis labels -->
  <g font-size="12" fill="#64748b" text-anchor="middle">
    <text x="96"  y="440">Sep</text>
    <text x="168" y="440">Oct</text>
    <text x="240" y="440">Nov</text>
    <text x="311" y="440">Dec</text>
    <text x="383" y="440">Jan</text>
    <text x="455" y="440">Feb</text>
    <text x="527" y="440">Mar</text>
    <text x="599" y="440">Apr</text>
    <text x="670" y="440">May</text>
    <text x="742" y="440">Jun</text>
    <text x="814" y="440">Jul</text>
  </g>
  <text x="96"  y="456" text-anchor="middle" font-size="11" fill="#94a3b8">2025</text>
  <text x="383" y="456" text-anchor="middle" font-size="11" fill="#94a3b8">2026</text>

  <!-- Legend / caption -->
  <circle cx="66" cy="472" r="4" fill="#059669"/>
  <text x="76" y="476" font-size="12" fill="#64748b">Claude release</text>
  <rect x="196" y="468" width="12" height="8" fill="#64748b"/>
  <text x="214" y="476" font-size="12" fill="#64748b">screpdb releases / month  ·  *July to the 5th</text>
</svg>
